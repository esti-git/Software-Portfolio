<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Premium | מערכת ניהול</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    
    <header class="main-header">
        <div class="header-content">
            <div class="brand">
                <div class="logo-gold">V</div>
                <h1>Volunteer<span>Elite</span></h1>
            </div>
            <button onclick="openRegisterOnly()" class="gold-btn">רישום מתנדב חדש</button>
        </div>
    </header>

    <main class="wrapper">
        <section class="search-bar-luxury">
            <div class="input-box">
                <label>עיר</label>
                <input type="text" id="filterCity" placeholder="חפש לפי מיקום...">
            </div>
            <div class="input-box">
                <label>רמת דחיפות</label>
                <select id="filterPriority">
                    <option value="">כל הרמות</option>
                    <option value="1">שגרתי</option>
                    <option value="2">בינוני</option>
                    <option value="3">דחוף</option>
                    <option value="4">קריטי</option>
                </select>
            </div>
            <div class="input-box">
                <label>סטטוס</label>
                <select id="filterStatus">
                    <option value="">הצג הכל</option>
                    <option value="1">ממתין לסיוע</option>
                    <option value="2">בטיפול פעיל</option>
                    <option value="3">הושלם</option>
                </select>
            </div>
            <button onclick="fetchRequests()" class="search-trigger">חיפוש</button>
        </section>

        <div id="requestsList" class="grid-luxury">
            </div>
    </main>

    <div id="requestModal" class="luxury-modal">
        <div class="modal-inner">
            <button class="close-btn" onclick="closeModal('requestModal')">×</button>
            <div class="modal-body">
                <div id="modalPriorityLabel" class="luxury-badge"></div>
                <h2 id="modalTitle"></h2>
                <div id="modalDetails" class="luxury-info"></div>
                <div id="volunteerActionArea" class="action-footer"></div>
            </div>
        </div>
    </div>

    <div id="authModal" class="luxury-modal">
        <div class="modal-inner auth-box">
            <button class="close-btn" onclick="closeModal('authModal')">×</button>
            
            <div id="loginView" class="auth-section">
                <h3>זיהוי מתנדב</h3>
                <p>הכנס קוד אישי לכניסה למערכת</p>
                <input type="text" id="volunteerInputId" class="luxury-input" placeholder="קוד מתנדב (למשל VOL1020)">
                <div id="errorMsg" class="error-luxury" style="display:none;">
                    <p>הקוד אינו תקין</p>
                    <button onclick="showRegisterView()" class="link-btn">עדיין לא רשום? הצטרף אלינו</button>
                </div>
                <button onclick="checkVolunteerExists()" class="confirm-btn">כניסה ואישור התנדבות</button>
            </div>

            <div id="registerView" class="auth-section" style="display:none;">
                <h3>הצטרפות לנבחרת</h3>
                <p>מלא פרטים לקבלת קוד מתנדב אישי</p>
                <div class="grid-inputs">
                    <input type="text" id="regIdCard" placeholder="תעודת זהות">
                    <input type="text" id="regFName" placeholder="שם פרטי">
                    <input type="text" id="regLName" placeholder="שם משפחה">
                    <input type="text" id="regPhone" placeholder="טלפון">
                </div>
                <button onclick="processRegistration()" class="confirm-btn gold">סיים רישום</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
